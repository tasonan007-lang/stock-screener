name: stock-screener

on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Pythonセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: ライブラリインストール
        run: |
          pip install --upgrade pip
          pip install xlrd
          pip install yfinance pandas numpy tqdm requests openpyxl

      - name: 実行
        run: python screener.py
